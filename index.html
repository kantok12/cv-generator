<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CV Generator - AlmeiraStore</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M15 12a3 3 0 11-6 0 3 3 0 016 0z' fill='%2386efac'/><path d='M2.458 12C3.732 7.943 7.523 7 12c0 4.477 3.79 8 8.542 8 0 4.477-3.79-8-8.542-8 0-4.477 3.79-8 8.542-8 0-.39.004.02-.01.003-.003z' fill='%2386efac'/><path d='M12 2l3.09 6.26L22 12l-6.91 1.04L12 22l-3.09-6.26L2 12l6.91-1.04L12 2z' fill='%2386efac'/></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
  <style>
    @media print {
      .no-print { display: none !important; }
      .print-only { display: block !important; }
    }
  </style>
</head>
<body class="bg-gradient-to-br from-blue-50 via-blue-100 to-slate-100 dark:from-slate-900 dark:via-slate-800 dark:to-slate-900 min-h-screen transition-colors duration-300 pb-20" data-theme="light">
  <!-- Header -->
  <header class="bg-white dark:bg-slate-800 border-b border-blue-200 dark:border-slate-700 shadow-sm sticky top-0 z-10 transition-colors duration-300">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="text-white p-2 rounded-lg transition-colors duration-300">
            <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 7 12c0 4.477 3.79 8 8.542 8 0 4.477-3.79-8-8.542-8 0-.39.004.02-.01.003-.003z"></path>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 2l3.09 6.26L22 12l-6.91 1.04L12 22l-3.09-6.26L2 12l6.91-1.04L12 2z"></path>
            </svg>
          </div>
          <div>
            <h1 class="text-xl font-bold text-blue-900 dark:text-white transition-colors duration-300">CV Generator</h1>
            <p class="text-sm text-blue-600 dark:text-blue-200 transition-colors duration-300">by COIAM</p>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-4 sm:py-6 lg:py-8">
    <div class="grid grid-cols-1 justify-center">
      <!-- Form Section -->
      <div id="formSection">
        <div class="bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-blue-200 dark:border-slate-700 p-4 sm:p-6 transition-colors duration-300 max-w-4xl">
          <!-- Tabs -->
          <div class="flex flex-wrap gap-1 bg-blue-100 dark:bg-slate-700 p-1 rounded-lg mb-4 sm:mb-6 transition-colors duration-300 flex-1">
            <button data-tab="personal" class="tab-btn tab-active flex items-center justify-center gap-1.5 px-2 sm:px-3 py-2 text-xs sm:text-sm rounded-md transition-colors bg-white dark:bg-slate-600 text-blue-700 dark:text-white shadow-sm flex-1">
              <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
              <span class="hidden sm:inline">Personal</span>
            </button>
            <button data-tab="profile" class="tab-btn tab-inactive flex items-center justify-center gap-1.5 px-2 sm:px-3 py-2 text-xs sm:text-sm rounded-md transition-colors text-blue-600 dark:text-blue-200 flex-1">
              <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
              <span class="hidden sm:inline">Perfil</span>
            </button>
            <button data-tab="skills" class="tab-btn tab-inactive flex items-center justify-center gap-1.5 px-2 sm:px-3 py-2 text-xs sm:text-sm rounded-md transition-colors text-blue-600 dark:text-blue-200 flex-1">
              <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path></svg>
              <span class="hidden sm:inline">Competencias</span>
            </button>
            <button data-tab="education" class="tab-btn tab-inactive flex items-center justify-center gap-1.5 px-2 sm:px-3 py-2 text-xs sm:text-sm rounded-md transition-colors text-blue-600 dark:text-blue-200 flex-1">
              <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"></path></svg>
              <span class="hidden sm:inline">Educación</span>
            </button>
            <button data-tab="languages" class="tab-btn tab-inactive flex items-center justify-center gap-1.5 px-2 sm:px-3 py-2 text-xs sm:text-sm rounded-md transition-colors text-blue-600 dark:text-blue-200 flex-1">
              <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129"></path></svg>
              <span class="hidden sm:inline">Idiomas</span>
            </button>
            <button data-tab="experience" class="tab-btn tab-inactive flex items-center justify-center gap-1.5 px-2 sm:px-3 py-2 text-xs sm:text-sm rounded-md transition-colors text-blue-600 dark:text-blue-200 flex-1">
              <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
              <span class="hidden sm:inline">Experiencia</span>
            </button>
          </div>

          <!-- Form Content -->
          <form id="cvForm">
            <!-- Personal Info Tab -->
            <div id="tab-personal" class="tab-content">
              <div class="bg-blue-50/50 dark:bg-slate-700/50 border border-blue-200 dark:border-slate-600 rounded-lg">
                <div class="border-b border-blue-100 dark:border-slate-600 px-4 py-3">
                  <h3 class="text-lg font-semibold text-blue-700 dark:text-blue-200 flex items-center gap-2">
                    <svg class="h-5 w-5 text-blue-500 dark:text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    Información Personal
                  </h3>
                </div>
                <div class="p-4 space-y-4">
                  <!-- Foto de perfil -->
                  <div class="flex items-start gap-4">
                    <div class="flex-shrink-0">
                      <div id="photoPreviewContainer" class="w-28 h-36 bg-blue-100 dark:bg-slate-600 rounded-lg border-2 border-dashed border-blue-300 dark:border-slate-500 flex items-center justify-center overflow-hidden">
                        <svg id="photoPlaceholder" class="h-10 w-10 text-blue-400 dark:text-blue-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                        </svg>
                        <img id="photoPreview" class="hidden w-full h-full object-cover">
                      </div>
                    </div>
                    <div class="flex-1 space-y-2">
                      <label class="text-sm font-medium text-blue-600 dark:text-blue-300">Foto de Perfil</label>
                      <input type="file" id="profilePhoto" accept="image/png,image/jpeg" required class="w-full px-3 py-2 border border-blue-200 dark:border-slate-600 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-300 dark:focus:ring-slate-500 text-sm bg-white dark:bg-slate-700 text-blue-900 dark:text-white">
                      <p class="text-xs text-blue-400 dark:text-blue-300">Formatos: JPG, PNG. Tamaño recomendado: 300x400px</p>
                      <button type="button" id="removePhotoBtn" class="hidden text-sm text-rose-500 hover:text-rose-600">Eliminar foto</button>
                    </div>
                  </div>
                  <div class="border-t border-blue-100 dark:border-slate-600 pt-4"></div>
                  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="space-y-2">
                      <label class="text-sm font-medium text-blue-600 dark:text-blue-300">Nombre Completo <span class="text-rose-500">*</span></label>
                      <input type="text" name="fullName" placeholder="Ej: María González López" class="w-full px-3 py-2 border border-blue-200 dark:border-slate-600 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-300 dark:focus:ring-slate-500 bg-white dark:bg-slate-700 text-blue-900 dark:text-white">
                    </div>
                    <div class="space-y-2">
                      <label class="text-sm font-medium text-blue-600 dark:text-blue-300">Título Profesional <span class="text-rose-500">*</span></label>
                      <input type="text" name="title" placeholder="Ej: Ingeniera de Software" class="w-full px-3 py-2 border border-blue-200 dark:border-slate-600 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-300 dark:focus:ring-slate-500 bg-white dark:bg-slate-700 text-blue-900 dark:text-white">
                    </div>
                    <div class="space-y-2">
                      <label class="text-sm font-medium text-blue-600 dark:text-blue-300">Ubicación <span class="text-rose-500">*</span></label>
                      <input type="text" name="location" placeholder="Ej: Madrid, España" class="w-full px-3 py-2 border border-blue-200 dark:border-slate-600 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-300 dark:focus:ring-slate-500 bg-white dark:bg-slate-700 text-blue-900 dark:text-white">
                    </div>
                    <div class="space-y-2">
                      <label class="text-sm font-medium text-blue-600 dark:text-blue-300">Teléfono <span class="text-rose-500">*</span></label>
                      <input type="text" name="phone" placeholder="Ej: +57 3005415898" class="w-full px-3 py-2 border border-blue-200 dark:border-slate-600 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-300 dark:focus:ring-slate-500 bg-white dark:bg-slate-700 text-blue-900 dark:text-white">
                    </div>
                    <div class="space-y-2">
                      <label class="text-sm font-medium text-blue-600 dark:text-blue-300">Correo Electrónico <span class="text-rose-500">*</span></label>
                      <input type="email" name="email" placeholder="Ej: maria.gonzalez@email.com" class="w-full px-3 py-2 border border-blue-200 dark:border-slate-600 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-300 dark:focus:ring-slate-500 bg-white dark:bg-slate-700 text-blue-900 dark:text-white">
                    </div>
                    <div class="space-y-2">
                      <label class="text-sm font-medium text-blue-600 dark:text-blue-300">LinkedIn</label>
                      <input type="url" name="linkedin" placeholder="Ej: https://linkedin.com/in/tuusuario" class="w-full px-3 py-2 border border-blue-200 dark:border-slate-600 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-300 dark:focus:ring-slate-500 bg-white dark:bg-slate-700 text-blue-900 dark:text-white">
                    </div>
                    <div class="space-y-2 md:col-span-2">
                      <label class="text-sm font-medium text-blue-600 dark:text-blue-300">GitHub</label>
                      <input type="url" name="github" placeholder="Ej: https://github.com/tuusuario" class="w-full px-3 py-2 border border-blue-200 dark:border-slate-600 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-300 dark:focus:ring-slate-500 bg-white dark:bg-slate-700 text-blue-900 dark:text-white">
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <!-- Profile Tab -->
            <div id="tab-profile" class="tab-content hidden">
              <div class="bg-blue-50/50 dark:bg-slate-700/50 border border-blue-200 dark:border-slate-600 rounded-lg">
                <div class="border-b border-blue-100 dark:border-slate-600 px-4 py-3">
                  <h3 class="text-lg font-semibold text-blue-700 dark:text-blue-200 flex items-center gap-2">
                    <svg class="h-5 w-5 text-blue-500 dark:text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    Perfil Profesional
                  </h3>
                </div>
                <div class="p-4 space-y-4">
                  <div class="space-y-2">
                    <label class="text-sm font-medium text-blue-600 dark:text-blue-300">Descripción Profesional <span class="text-rose-500">*</span></label>
                    <textarea name="profile" rows="6" placeholder="Describe tu experiencia, habilidades clave y objetivos profesionales..." class="w-full px-3 py-2 border border-blue-200 dark:border-slate-600 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-300 dark:focus:ring-slate-500 bg-white dark:bg-slate-700 text-blue-900 dark:text-white resize-none"></textarea>
                  </div>
                </div>
              </div>
            </div>

            <!-- Skills Tab -->
            <div id="tab-skills" class="tab-content hidden">
              <div class="bg-blue-50/50 dark:bg-slate-700/50 border border-blue-200 dark:border-slate-600 rounded-lg">
                <div class="border-b border-blue-100 dark:border-slate-600 px-4 py-3">
                  <h3 class="text-lg font-semibold text-blue-700 dark:text-blue-200 flex items-center gap-2">
                    <svg class="h-5 w-5 text-blue-500 dark:text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path></svg>
                    Competencias
                  </h3>
                </div>
                <div class="p-4 space-y-6">
                  <!-- Technical Skills -->
                  <div class="space-y-3">
                    <label class="text-sm font-medium text-blue-600 dark:text-blue-300">Habilidades Técnicas <span class="text-rose-500">*</span></label>
                    <div class="flex gap-2">
                      <input type="text" id="techSkillInput" placeholder="Ej: React, TypeScript, Python..." class="flex-1 px-3 py-2 border border-blue-200 dark:border-slate-600 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-300 dark:focus:ring-slate-500 bg-white dark:bg-slate-700 text-blue-900 dark:text-white">
                      <button type="button" data-action="add-skill-tech" class="px-3 py-2 border border-blue-200 dark:border-slate-600 rounded-md hover:bg-blue-50 dark:hover:bg-slate-600">
                        <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                      </button>
                    </div>
                    <div id="techSkills" class="flex flex-wrap gap-2"></div>
                  </div>
                  <div class="border-t border-blue-100 dark:border-slate-600"></div>
                  <!-- Soft Skills -->
                  <div class="space-y-3">
                    <label class="text-sm font-medium text-blue-600 dark:text-blue-300">Habilidades Blandas <span class="text-rose-500">*</span></label>
                    <div class="flex gap-2">
                      <input type="text" id="softSkillInput" placeholder="Ej: Liderazgo, Comunicación..." class="flex-1 px-3 py-2 border border-blue-200 dark:border-slate-600 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-300 dark:focus:ring-slate-500 bg-white dark:bg-slate-700 text-blue-900 dark:text-white">
                      <button type="button" data-action="add-skill-soft" class="px-3 py-2 border border-blue-200 dark:border-slate-600 rounded-md hover:bg-blue-50 dark:hover:bg-slate-600">
                        <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                      </button>
                    </div>
                    <div id="softSkills" class="flex flex-wrap gap-2"></div>
                  </div>
                </div>
              </div>
            </div>

            <!-- Education Tab -->
            <div id="tab-education" class="tab-content hidden">
              <div class="bg-blue-50/50 dark:bg-slate-700/50 border border-blue-200 dark:border-slate-600 rounded-lg">
                <div class="border-b border-blue-100 dark:border-slate-600 px-4 py-3">
                  <h3 class="text-lg font-semibold text-blue-700 dark:text-blue-200 flex items-center gap-2">
                    <svg class="h-5 w-5 text-blue-500 dark:text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"></path></svg>
                    Educación
                  </h3>
                </div>
                <div class="p-4 space-y-4" id="educationContainer"></div>
                <div class="px-4 pb-4">
                  <button type="button" data-action="add-education" class="w-full py-2 border border-dashed border-blue-300 dark:border-slate-500 rounded-md hover:bg-blue-50 dark:hover:bg-slate-600 text-blue-600 dark:text-blue-200 flex items-center justify-center">
                    + Agregar Educación
                  </button>
                </div>
              </div>
            </div>

            <!-- Languages Tab -->
            <div id="tab-languages" class="tab-content hidden">
              <div class="bg-blue-50/50 dark:bg-slate-700/50 border border-blue-200 dark:border-slate-600 rounded-lg">
                <div class="border-b border-blue-100 dark:border-slate-600 px-4 py-3">
                  <h3 class="text-lg font-semibold text-blue-700 dark:text-blue-200 flex items-center gap-2">
                    <svg class="h-5 w-5 text-blue-500 dark:text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129"></path></svg>
                    Idiomas
                  </h3>
                </div>
                <div class="p-4 space-y-4" id="languagesContainer"></div>
                <div class="px-4 pb-4">
                  <button type="button" data-action="add-language" class="w-full py-2 border border-dashed border-blue-300 dark:border-slate-500 rounded-md hover:bg-blue-50 dark:hover:bg-slate-600 text-blue-600 dark:text-blue-200 flex items-center justify-center">
                    + Agregar Idioma
                  </button>
                </div>
              </div>
            </div>

            <!-- Experience Tab -->
            <div id="tab-experience" class="tab-content hidden">
              <div class="bg-blue-50/50 dark:bg-slate-700/50 border border-blue-200 dark:border-slate-600 rounded-lg">
                <div class="border-b border-blue-100 dark:border-slate-600 px-4 py-3">
                  <h3 class="text-lg font-semibold text-blue-700 dark:text-blue-200 flex items-center gap-2">
                    <svg class="h-5 w-5 text-blue-500 dark:text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                    Experiencia Laboral
                  </h3>
                </div>
                <div class="p-4 space-y-4" id="experienceContainer"></div>
                <div class="px-4 pb-4">
                  <button type="button" data-action="add-experience" class="w-full py-2 border border-dashed border-blue-300 dark:border-slate-500 rounded-md hover:bg-blue-50 dark:hover:bg-slate-600 text-blue-600 dark:text-blue-200 flex items-center justify-center">
                    + Agregar Experiencia
                  </button>
                </div>
              </div>
            </div>

            <!-- Action Buttons -->
            <div class="flex flex-col sm:flex-row gap-3 pt-4 sm:pt-6 border-t border-blue-200 dark:border-slate-700 mt-4 sm:mt-6 transition-colors duration-300">
              <button type="button" id="autoFillBtn" class="flex-1 py-2.5 px-4 bg-amber-600 dark:bg-amber-500 hover:bg-amber-700 dark:hover:bg-amber-600 text-white rounded-md font-medium transition-colors duration-300">
                Autorrellenar CV
              </button>
              <button type="button" id="previewBtn" class="flex-1 py-2.5 px-4 bg-green-700 dark:bg-green-600 hover:bg-green-800 dark:hover:bg-green-700 text-white rounded-md font-medium transition-colors duration-300">
                Vista Previa
              </button>
